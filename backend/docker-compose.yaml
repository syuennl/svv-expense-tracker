version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: expense_tracker_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: expense_tracker
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: